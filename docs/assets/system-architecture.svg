<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">基金收益预测助手 V1 系统架构图</title>
  <desc id="desc">展示用户入口、应用层、业务能力、基础能力和外部数据源之间的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <style>
      text { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .title { font-size: 36px; font-weight: 700; }
      .subtitle { font-size: 18px; fill: #607086; }
      .layer-title { font-size: 21px; font-weight: 700; fill: #0f172a; }
      .item { font-size: 17px; fill: #334155; }
      .small { font-size: 14px; fill: #64748b; }
      .card { fill: #ffffff; stroke: #dbe4ef; stroke-width: 1.2; filter: url(#shadow); }
      .chip { fill: #f8fafc; stroke: #dbe4ef; stroke-width: 1; }
      .accent-red { fill: #ef4444; }
      .accent-green { fill: #22a06b; }
      .accent-gold { fill: #d6a23a; }
      .accent-blue { fill: #2563eb; }
      .line { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="64" y="70" class="title">基金收益预测助手 V1 系统架构</text>
  <text x="64" y="104" class="subtitle">Flask 单体后端 + 原生 Web 前端 + CLI 工具 + 多源金融数据 + AI 辅助分析</text>

  <rect x="64" y="145" width="1152" height="88" rx="18" class="card"/>
  <text x="96" y="181" class="layer-title">用户入口</text>
  <rect x="250" y="166" width="220" height="42" rx="12" class="chip"/>
  <circle cx="278" cy="187" r="9" class="accent-blue"/>
  <text x="298" y="193" class="item">Web 浏览器</text>
  <rect x="510" y="166" width="220" height="42" rx="12" class="chip"/>
  <circle cx="538" cy="187" r="9" class="accent-gold"/>
  <text x="558" y="193" class="item">CLI 终端</text>
  <rect x="770" y="166" width="300" height="42" rx="12" class="chip"/>
  <circle cx="798" cy="187" r="9" class="accent-green"/>
  <text x="818" y="193" class="item">AI 对话与图片导入</text>

  <path class="line" d="M640 234 L640 273"/>

  <rect x="64" y="274" width="1152" height="122" rx="18" class="card"/>
  <text x="96" y="312" class="layer-title">应用层</text>
  <rect x="248" y="300" width="190" height="58" rx="14" class="chip"/>
  <text x="282" y="324" class="item">Flask API</text>
  <text x="282" y="346" class="small">20+ HTTP 端点</text>
  <rect x="478" y="300" width="210" height="58" rx="14" class="chip"/>
  <text x="512" y="324" class="item">原生 JavaScript SPA</text>
  <text x="512" y="346" class="small">图表、弹窗、持仓面板</text>
  <rect x="728" y="300" width="190" height="58" rx="14" class="chip"/>
  <text x="762" y="324" class="item">Chart.js</text>
  <text x="762" y="346" class="small">净值与行情可视化</text>
  <rect x="958" y="300" width="190" height="58" rx="14" class="chip"/>
  <text x="992" y="324" class="item">CLI 命令</text>
  <text x="992" y="346" class="small">list / add / signal</text>

  <path class="line" d="M640 397 L640 436"/>

  <rect x="64" y="437" width="1152" height="130" rx="18" class="card"/>
  <text x="96" y="475" class="layer-title">业务能力</text>
  <rect x="226" y="462" width="145" height="62" rx="14" class="chip"/>
  <text x="255" y="488" class="item">持仓管理</text>
  <text x="250" y="510" class="small">收益统计</text>
  <rect x="395" y="462" width="145" height="62" rx="14" class="chip"/>
  <text x="424" y="488" class="item">基金分析</text>
  <text x="426" y="510" class="small">估值 / 净值</text>
  <rect x="564" y="462" width="145" height="62" rx="14" class="chip"/>
  <text x="585" y="488" class="item">量化信号</text>
  <text x="594" y="510" class="small">五因子评分</text>
  <rect x="733" y="462" width="145" height="62" rx="14" class="chip"/>
  <text x="754" y="488" class="item">智能推荐</text>
  <text x="761" y="510" class="small">基金池筛选</text>
  <rect x="902" y="462" width="145" height="62" rx="14" class="chip"/>
  <text x="923" y="488" class="item">市场行情</text>
  <text x="925" y="510" class="small">指数 / 板块</text>
  <rect x="1071" y="462" width="110" height="62" rx="14" class="chip"/>
  <text x="1091" y="488" class="item">AI</text>
  <text x="1088" y="510" class="small">对话 / 识别</text>

  <path class="line" d="M640 568 L640 606"/>

  <rect x="64" y="607" width="536" height="96" rx="18" class="card"/>
  <text x="96" y="643" class="layer-title">基础能力</text>
  <text x="250" y="642" class="item">令牌桶限流</text>
  <text x="390" y="642" class="item">多级缓存</text>
  <text x="250" y="674" class="item">接口容错</text>
  <text x="390" y="674" class="item">本地配置</text>

  <rect x="680" y="607" width="536" height="96" rx="18" class="card"/>
  <text x="712" y="643" class="layer-title">外部数据源</text>
  <text x="878" y="642" class="item">东方财富 / 天天基金</text>
  <text x="878" y="674" class="item">新浪财经 / OpenAI 兼容服务</text>

  <path class="line" d="M600 655 L678 655"/>
  <circle cx="116" cy="674" r="8" class="accent-red"/>
  <circle cx="139" cy="674" r="8" class="accent-green"/>
  <circle cx="162" cy="674" r="8" class="accent-gold"/>
</svg>
